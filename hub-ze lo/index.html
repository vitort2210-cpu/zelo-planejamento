// ASSISTENTE DO HUB — chat por regras (client-side, sem servidor/custo)
// ══════════════════════════════════════════════════════════════════════════════
let asstMontado = false, asstAberto = false;
let asstCache = { carregado:false, cycles:[] };
let asstMsgs = [];
let asstPending = null;   // ação aguardando confirmação/escolha

function zaNorm(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[^\x00-\x7f]/g,''); }

// O assistente responde sempre sobre o ano selecionado no HUB (junho existe em
// 2026 e em 2027 — sem isso as contagens e listas misturariam os dois).
function zaCy(){ return (asstCache.cycles||[]).filter(c=>c.ano===anoAtivo); }
// Ao navegar para um ciclo, alinha o ano ativo com o ciclo aberto.
function zaSincAno(c){ if(c && c.ano && c.ano!==anoAtivo) anoAtivo=c.ano; }

// Mapa de status por área. Cada "alvo" vira o valor certo em cada aba.
const ZA_STATUS = {
  aprovado:      { plan:'aprovado',      copy:'aprovado',           design:'aprovado',            lbl:'Aprovado' },
  ajuste:        { plan:'ajuste',        copy:'revisao_necessaria', design:'ajustes_necessarios', lbl:'Ajuste / revisão' },
  bloqueado:     { plan:'bloqueado',     copy:'cancelado',          design:null,                  lbl:'Bloqueado / cancelado' },
  redirecionado: { plan:'redirecionado', copy:null,                 design:null,                  lbl:'Redirecionado' },
};
const ZA_AREA_LBL = { plan:'Planejamento', copy:'Copy', design:'Conteúdos' };

async function carregarTudoAssistente(){
  const plist = estado.planejamentos || []; const cycles = [];
  for (let i=0;i<plist.length;i++){
    const p=plist[i], docId=cicloDocId(p);
    const c={ docId, idx:i, ano:anoCiclo(p), periodo:p.periodo||'', ciclo:p.ciclo||'', items:[], estados:{}, copy:{}, design:{}, posts:{} };
    try{ const g=await getDoc(doc(db,'planejamentos',docId)); if(g.exists()){ const d=g.data(); c.items=Array.isArray(d.items)?d.items:[]; c.estados=d.estados||{}; } }catch(e){}
    try{ const cp=await getDoc(copyRef(docId)); if(cp.exists()) c.copy=cp.data().itens||{}; }catch(e){}
    try{ const dz=await getDoc(designRef(docId)); if(dz.exists()) c.design=dz.data().itens||{}; }catch(e){}
    try{ const pp=await getDoc(postsRef(docId)); if(pp.exists()){ c.posts=pp.data().itens||{}; c.metCiclo=pp.data().ciclo||{}; } }catch(e){}
    cycles.push(c);
  }
  try{ const ms=await getDoc(metricasRef); if(ms.exists()&&Array.isArray(ms.data().snapshots)) metricasData={ snapshots:ms.data().snapshots }; }catch(e){}
  asstCache={ carregado:true, cycles };
  if(document.getElementById('za-menu')) zaRenderMenu();
}

function zaBuscar(query){
  const q=zaNorm(query); const qt=q.split(/\s+/).filter(w=>w.length>2); const res=[];
  (asstCache.cycles||[]).forEach(c=>{
    (c.items||[]).forEach(it=>{
      const hay=zaNorm([it.titulo,it.pilar,it.formato,it.data].join(' '));
      let sc=0;
      if(q.length>2 && hay.includes(q)) sc+=12;
      qt.forEach(w=>{ if(hay.includes(w)) sc+=3; });
      if(sc>0) res.push({ sc, c, it });
    });
  });
  res.sort((a,b)=>b.sc-a.sc);
  return res.slice(0,6);
}
function zaStatusAtual(c,it){
  const est=c.estados[it.id]||''; const cp=c.copy[it.id]||{}; const dz=c.design[it.id]||{};
  const P={ aprovado:'✅ Aprovado', ajuste:'✏️ Ajuste', bloqueado:'⛔ Bloqueado', redirecionado:'↩️ Redirecionado' };
  const G={ aprovado:'👍 Aprovado', revisao_necessaria:'✏️ Revisão', cancelado:'✕ Cancelado', em_validacao:'🔍 Em validação', validacao_necessaria:'⏳ A validar' };
  const D={ aprovado:'👍 Aprovado', ajustes_necessarios:'✏️ Ajustes', em_analise:'🔍 Em análise' };
  return `Planej.: ${P[est]||'—'}  ·  Copy: ${G[cp.statusGabi]||'—'}  ·  Conteúdo: ${D[dz.statusDesign]||'—'}`;
}
function zaStatusAlvo(t){
  if(/aprov|valid/.test(t)) return 'aprovado';
  if(/ajuste|revis/.test(t)) return 'ajuste';
  if(/bloque|cancel/.test(t)) return 'bloqueado';
  if(/redirecion/.test(t)) return 'redirecionado';
  return null;
}
function zaAreaAlvo(t){
  if(/planejamento|planej|grade|calendario/.test(t)) return 'plan';
  if(/\bcopy\b|legenda|texto|roteiro/.test(t)) return 'copy';
  if(/design|arte|conteudo|conteudos|imagem|foto|video|reels|carrossel/.test(t)) return 'design';
  return null;
}
function zaPodeMarcar(area){
  if(area==='design') return podeValidarDesign();
  return ROLE==='editor' || ROLE==='cliente';
}

// ── Fluxo de conversa ──────────────────────────────────────────────────────────
function zaResponder(txt){
  asstMsgs.push({ from:'user', html:esc(txt) }); zaRender();
  const t=zaNorm(txt);
  if(!asstCache.carregado){ return zaBot('Ainda estou carregando os dados dos ciclos… tente de novo em instantes. ⏳'); }
  if(/\bajuda\b|o que voce faz|como funciona|comandos/.test(t)) return zaAjuda();
  if(/^(oi+|ola|opa|e ?ai|bom dia|boa tarde|boa noite|hello|hey)\b/.test(t)) return zaBot('Oi! 👋 Como posso ajudar? Toque numa opção do menu abaixo ou escreva sua pergunta.');
  if(/obrigad|valeu|agradec|\bobg\b|thank/.test(t)) return zaBot('De nada! 😊 Precisando, é só chamar.');
  const zaAtalhos=[
    [/glossario|o que (e|é|significa).*(engajamento|alcance|metrica|impress|intera)/,'met-glossario'],
    [/evolu(c|ç)ao|cresc(imento|eu)/,'met-evolucao'],
    [/slogan/,'db-slogan'],
    [/posicionamento/,'db-posicionamento'],
    [/publico[ -]?alvo|nosso publico/,'db-publico'],
    [/objetivo/,'db-objetivos'],
    [/guia de voz|tom de voz|vocabulario/,'db-voz'],
    [/referencia/,'db-referencias'],
    [/quantos conteudos|numero de conteudos/,'plan-contagem'],
    [/materiais|guia de comunicacao/,'db-materiais'],
    [/resumo da marca|sobre a marca/,'db-resumo'],
    [/dados da empresa|contato da empresa/,'db-empresa'],
  ];
  for(const [re,qid] of zaAtalhos){ if(re.test(t)) return zaQuery(qid); }
  if(/\bresumo\b/.test(t) && zaCicloFoco) return zaQuery('ciclo-resumo');
  if(/o que falta|quais faltam|falta valid|pendente|em aberto/.test(t)) return zaFalta();

  const alvo = zaStatusAlvo(t);
  const querMarcar = alvo && /(marc|aprov|valid|bloque|cancel|ajuste|revis|redirecion|muda|define|coloca)/.test(t);

  if(/metrica|engajamento|alcance|seguidor|desempenho|impress|visitant|numero/.test(t) || (/\b(instagram|linkedin|site)\b/.test(t) && !querMarcar)){
    const plat=/instagram|insta/.test(t)?'instagram':/linkedin/.test(t)?'linkedin':/\bsite\b/.test(t)?'site':null;
    return zaBot(zaResumoMetricas(plat));
  }

  const matches = zaBuscar(txt);
  if(querMarcar){
    if(!matches.length) return zaBot('Não encontrei esse conteúdo. Pode me dizer o título (ou parte dele)?');
    const m=matches[0], area=zaAreaAlvo(t);
    if(area) return zaPrepararMarcar(m.c,m.it,area,alvo);
    asstPending={ tipo:'area', c:m.c, it:m.it, alvo };
    return zaBot(`Encontrei "${esc(m.it.titulo)}" (${esc(m.c.periodo)}). Marcar como **${ZA_STATUS[alvo].lbl}** em qual área?`,
      [{lbl:'📅 Planejamento',act:'area:plan'},{lbl:'✍️ Copy',act:'area:copy'},{lbl:'🎨 Conteúdos',act:'area:design'},{lbl:'Cancelar',act:'cancel'}]);
  }

  if(matches.length){
    if(matches.length===1) return zaMostrar(matches[0]);
    return zaBot('Achei estes conteúdos — qual você quer?',
      matches.map(m=>({ lbl:`${m.it.data||''} · ${m.it.titulo}`.slice(0,44), act:`pick:${m.c.idx}:${m.it.id}` })).concat([{lbl:'Cancelar',act:'cancel'}]));
  }
  return zaBot('Não achei uma resposta pronta pra isso 🤔.\nToque em **☰ Início** no menu abaixo para ver as opções — ou tente pelo título do conteúdo (ex.: "reels do brincar").');
}
function zaMostrar(m){
  zaBot(`📌 **${esc(m.it.titulo)}**\n📅 ${esc(m.it.data||'--')} · ${esc(m.c.periodo)} · ${esc(m.it.pilar||'')} ${esc(m.it.formato||'')}\n${zaStatusAtual(m.c,m.it)}\n\nAbrir em:`,
    [{lbl:'✍️ Copy',act:`go:${m.c.idx}:${m.it.id}:copy`},{lbl:'🎨 Conteúdos',act:`go:${m.c.idx}:${m.it.id}:design`},{lbl:'📅 Planejamento',act:`go:${m.c.idx}:${m.it.id}:plan`}]);
}
function zaPrepararMarcar(c,it,area,alvo){
  const val=ZA_STATUS[alvo][area];
  if(!val) return zaBot(`Não dá pra marcar "${ZA_STATUS[alvo].lbl}" em ${ZA_AREA_LBL[area]} — esse status não existe nessa área.`);
  if(!zaPodeMarcar(area)) return zaBot(`Seu perfil (${ROLE}) não pode alterar o status em ${ZA_AREA_LBL[area]}. 🙅`);
  asstPending={ tipo:'confirm', c, it, area, alvo, val };
  return zaBot(`Confirmar: marcar **${esc(it.titulo)}** como **${ZA_STATUS[alvo].lbl}** em **${ZA_AREA_LBL[area]}** (${esc(c.periodo)})?`,
    [{lbl:'✓ Sim, marcar',act:'mark:go',primary:true},{lbl:'Cancelar',act:'cancel'}]);
}
async function zaExecutarMarcar(p){
  try{
    const ts=new Date().toISOString();
    if(p.area==='plan')        await setDoc(doc(db,'planejamentos',p.c.docId), { estados:{ [p.it.id]:p.val }, updatedAt:ts }, {merge:true});
    else if(p.area==='copy')   await setDoc(copyRef(p.c.docId),  { itens:{ [p.it.id]:{ statusGabi:p.val } },   updatedAt:ts }, {merge:true});
    else if(p.area==='design') await setDoc(designRef(p.c.docId),{ itens:{ [p.it.id]:{ statusDesign:p.val } }, updatedAt:ts }, {merge:true});
    if(p.area==='plan') p.c.estados[p.it.id]=p.val;
    else if(p.area==='copy')   p.c.copy[p.it.id]=Object.assign({},p.c.copy[p.it.id],{statusGabi:p.val});
    else if(p.area==='design') p.c.design[p.it.id]=Object.assign({},p.c.design[p.it.id],{statusDesign:p.val});
    zaBot(`Pronto! ✅ "${esc(p.it.titulo)}" marcado como **${ZA_STATUS[p.alvo].lbl}** em ${ZA_AREA_LBL[p.area]}.`,
      [{lbl:'Ir até o conteúdo',act:`go:${p.c.idx}:${p.it.id}:${p.area}`}]);
  }catch(e){ console.error(e); zaBot('❌ Não consegui gravar — verifique a conexão ou a permissão.'); }
}
function zaIrPara(area,c,it){
  zaBot(`Abrindo "${esc(it.titulo)}" em ${ZA_AREA_LBL[area]}… 👉`);
  zaSincAno(c);
  if(area==='plan'){ setTab('plan'); abrirPlan(c.idx, ROLE==='editor'?'edit':'valida'); return; }
  const mode = ROLE==='cliente' ? 'valida' : (area==='design' ? (podeSubirDesign()?'edit':'valida') : 'edit');
  if(area==='copy'){ setTab('copy'); abrirCicloCopy(c.docId, mode); }
  else if(area==='design'){ setTab('design'); abrirCicloDesign(c.docId, mode); }
  setTimeout(()=>zaDestacar((area==='copy'?'copy-card-':'design-card-')+it.id), 950);
}
function zaDestacar(id){ const el=document.getElementById(id); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('za-flash'); setTimeout(()=>el.classList.remove('za-flash'),1700); } }
function zaFalta(){
  const linhas=[];
  zaCy().forEach(c=>{
    const total=(c.items||[]).length; if(!total) return;
    let pend=0; (c.items||[]).forEach(it=>{ if((c.design[it.id]||{}).statusDesign!=='aprovado') pend++; });
    linhas.push(`• ${c.periodo}: **${pend}** de ${total} conteúdo(s) ainda não aprovado(s)`);
  });
  if(!linhas.length) return zaBot('Não há ciclos com conteúdos cadastrados ainda.');
  return zaBot('🗂️ Pendentes de aprovação (aba Conteúdos):\n\n'+linhas.join('\n'));
}
// Resumo de métricas agregado do desempenho por conteúdo (do ano ativo). Substituiu
// o resumo mensal por plataforma (agora é por ciclo/conteúdo).
function zaResumoMetricas(){
  const cy=zaCy(); let alcance=0, inter=0, n=0, segG=0, temSeg=false;
  cy.forEach(c=>{ const ag=agregarPosts(c.items, c.posts); alcance+=ag.alcance; inter+=ag.inter; n+=ag.n;
    const mc=c.metCiclo||{}; if(mc.seguidoresGanhos!=='' && mc.seguidoresGanhos!=null && !isNaN(Number(mc.seguidoresGanhos))){ segG+=Number(mc.seguidoresGanhos); temSeg=true; } });
  if(!n && !temSeg) return `📊 Ainda não há métricas por conteúdo preenchidas em ${anoAtivo}. Preencha na aba **Métricas → Por conteúdo**.`;
  const eng = alcance>0 ? (inter/alcance*100) : null;
  let out=`📊 **Resumo de ${anoAtivo}** (dos conteúdos com dados):\n• Alcance / visualizações: **${fmtMetric(alcance,'int')}**\n• Interações: **${fmtMetric(inter,'int')}**\n• Engajamento médio: **${eng==null?'—':fmtMetric(eng,'pct')}**\n• Conteúdos medidos: **${n}**`;
  if(temSeg) out+=`\n• Seguidores ganhos: **${fmtMetric(segG,'int')}**`;
  return out;
}
function zaAjuda(prefix){
  return zaBot((prefix||'')+'Posso te ajudar a:\n• **Encontrar** um conteúdo — "onde está o reels do brincar?"\n• **Levar você até ele** em Copy, Conteúdos ou Planejamento\n• **Marcar status** — "aprovar o carrossel de maio", "pedir ajuste no post X"\n• **Métricas** — "como está o engajamento do Instagram?"\n• **Pendências** — "o que falta validar?"');
}

// ── Ações dos botões ────────────────────────────────────────────────────────────
function zaAcharItem(idx,id){ const c=(asstCache.cycles||[]).find(x=>x.idx===+idx); const it=c&&(c.items||[]).find(x=>String(x.id)===String(id)); return {c,it}; }
window.zaAction = function(act){
  const a=act.split(':');
  if(act==='cancel'){ asstPending=null; return zaBot('Ok, cancelado. 👍'); }
  if(a[0]==='area'){ const p=asstPending; asstPending=null; if(p&&p.tipo==='area') return zaPrepararMarcar(p.c,p.it,a[1],p.alvo); return; }
  if(act==='mark:go'){ const p=asstPending; asstPending=null; if(p&&p.tipo==='confirm') return zaExecutarMarcar(p); return; }
  if(a[0]==='pick'){ const {c,it}=zaAcharItem(a[1],a[2]); if(c&&it) return zaMostrar({c,it}); return; }
  if(a[0]==='go'){ const {c,it}=zaAcharItem(a[1],a[2]); if(c&&it) return zaIrPara(a[3],c,it); return; }
  if(a[0]==='valcopy'||a[0]==='valdesign'){ const {c,it}=zaAcharItem(a[1],a[2]); if(c&&it) return zaFichaValidar(a[0]==='valcopy'?'copy':'design',c,it); return; }
  if(a[0]==='domark'){ const {c,it}=zaAcharItem(a[2],a[3]); if(c&&it) return zaPrepararMarcar(c,it,a[1],a[4]); return; }
  if(a[0]==='mes'){ const m=+a[1]; const found=[]; zaCy().forEach(c=>(c.items||[]).forEach(it=>{ if(+(String(it.data||'').split('/')[1])===m) found.push({c,it}); })); return zaBot(found.length?`🗓️ **${MESES_ABR[m-1]} de ${anoAtivo}:**\n`+found.map(f=>`• ${f.it.data} ${f.it.titulo} — ${f.c.periodo}`).join('\n'):`Nada planejado para ${MESES_ABR[m-1]} de ${anoAtivo}.`); }
};

window.zaMenu = function(code){
  const i=code.indexOf(':'), k=i<0?code:code.slice(0,i), arg=i<0?'':code.slice(i+1);
  if(k==='tela'){ zaTela=arg; zaRenderMenu(); return; }
  if(k==='foco'){ const c=(asstCache.cycles||[]).find(x=>x.idx===+arg); if(c){ zaSincAno(c); zaCicloFoco=c; zaTela='ciclo'; zaBot(`📦 Ciclo em foco: **${esc(c.periodo)}** (${esc(c.ciclo||'')}).`); zaRenderMenu(); } return; }
  if(k==='nav'){ setTab(arg); return; }
  if(k==='abrirmacro'){ setTab('plan'); abrirMacro(); return; }
  if(k==='cicloabrir'){ if(zaCicloFoco) zaAbrirCicloArea(arg,zaCicloFoco); return; }
  if(k==='q'){ return zaQuery(arg); }
};
function zaAbrirCicloArea(area,c){
  zaSincAno(c);
  if(area==='plan'){ setTab('plan'); abrirPlan(c.idx, ROLE==='editor'?'edit':'valida'); }
  else { const mode = ROLE==='cliente'?'valida':(area==='design'?(podeSubirDesign()?'edit':'valida'):'edit');
    if(area==='copy'){ setTab('copy'); abrirCicloCopy(c.docId,mode); } else { setTab('design'); abrirCicloDesign(c.docId,mode); } }
  zaBot(`Abri **${ZA_AREA_LBL[area]}** do ciclo ${esc(c.periodo)}. 👉`);
}
function zaFichaValidar(area,c,it){
  const acts=[{lbl:'👍 Aprovar',act:`domark:${area}:${c.idx}:${it.id}:aprovado`,primary:true}];
  if(ZA_STATUS.ajuste[area]) acts.push({lbl:'✏️ Pedir ajuste',act:`domark:${area}:${c.idx}:${it.id}:ajuste`});
  acts.push({lbl:'📖 Abrir para ver',act:`go:${c.idx}:${it.id}:${area}`});

    if(id==='ciclo-listar'){ return zaBot(its.length?`📝 Conteúdos de **${esc(f.periodo)}** — toque para ver:`:'Sem conteúdos neste ciclo.', its.length?its.slice(0,14).map(it=>({lbl:`${it.data||''} · ${it.titulo}`.slice(0,42),act:'pick:'+f.idx+':'+it.id})):null); }
    if(id==='ciclo-falta'){ const p=its.filter(it=>(f.design[it.id]||{}).statusDesign!=='aprovado'); return zaBot(p.length?`⏳ Falta aprovar em **${esc(f.periodo)}** (${p.length}):\n`+p.map(it=>`• ${it.data||''} ${it.titulo}`).join('\n'):`✅ Tudo aprovado em ${esc(f.periodo)}!`); }
    if(id==='ciclo-aprovados'){ const p=its.filter(it=>(f.design[it.id]||{}).statusDesign==='aprovado'); return zaBot(p.length?`✅ Já aprovados em **${esc(f.periodo)}** (${p.length}):\n`+p.map(it=>`• ${it.data||''} ${it.titulo}`).join('\n'):`Nenhum conteúdo aprovado ainda em ${esc(f.periodo)}.`); }
    if(id==='ciclo-agenda'){ const ord=its.slice().sort((a,b)=>{ const pa=String(a.data||'').split('/'),pb=String(b.data||'').split('/'); return ((+pa[1]||0)*100+(+pa[0]||0))-((+pb[1]||0)*100+(+pb[0]||0)); }); return zaBot(ord.length?`🗓️ **Agenda — ${esc(f.periodo)}:**\n`+ord.map(it=>`• ${it.data||'--'} — ${it.titulo} (${it.formato||''})`).join('\n'):'Sem conteúdos neste ciclo.'); }
    if(id==='ciclo-comentarios'){ const out=[]; its.forEach(it=>{ const nc=((f.copy[it.id]||{}).comentarios||[]).filter(x=>!x.resolvido).length; const cd=((f.design[it.id]||{}).comentarioDesign||'').trim(); const tg=[]; if(nc)tg.push('copy'); if(cd)tg.push('arte'); if(tg.length) out.push({it,tg}); }); return zaBot(out.length?`💬 Onde você comentou em **${esc(f.periodo)}** — toque para abrir:`:`💬 Nenhum comentário seu em ${esc(f.periodo)}.`, out.length?out.slice(0,14).map(m=>({lbl:`${m.it.titulo} (${m.tg.join('/')})`.slice(0,42),act:'pick:'+f.idx+':'+m.it.id})):null); }
    if(id==='ciclo-valida-design'){ const p=its.filter(it=>(f.design[it.id]||{}).statusDesign!=='aprovado'); return zaBot(p.length?'👍 Escolha a arte para validar:':'✅ Nada pendente nas artes deste ciclo.', p.length?p.slice(0,14).map(it=>({lbl:`${it.data||''} · ${it.titulo}`.slice(0,42),act:'valdesign:'+f.idx+':'+it.id})).concat([{lbl:'Cancelar',act:'cancel'}]):null); }
    if(id==='ciclo-valida-copy'){ const p=its.filter(it=>(f.copy[it.id]||{}).statusGabi!=='aprovado'); return zaBot(p.length?'👍 Escolha o texto para validar:':'✅ Nada pendente nos textos deste ciclo.', p.length?p.slice(0,14).map(it=>({lbl:`${it.data||''} · ${it.titulo}`.slice(0,42),act:'valcopy:'+f.idx+':'+it.id})).concat([{lbl:'Cancelar',act:'cancel'}]):null); }
    if(id==='ciclo-metricas') return zaBot(zaTopConteudos([f], f.periodo));
  }
  return zaAjuda('Opção não reconhecida. ');
}
function zaEvolucao(){
  const snaps=snapsSorted(); if(!snaps.length) return '📈 Ainda não há dados de métricas cadastrados.';
  let out='📈 **Evolução por mês:**';
  ['instagram','linkedin','site'].forEach(pl=>{ const cfg=METRICAS_CONFIG[pl]; const linhas=[];
    cfg.campos.slice(0,2).forEach(f=>{ const seq=snaps.map(s=>{ const val=valorMetrica(s,pl,f); return (val===''||val==null||isNaN(val))?null:Number(val); });
      if(seq.every(x=>x==null)) return; linhas.push(`${f.lbl}: `+snaps.map((s,i)=>`${mesLabel(s.mesRef)} ${seq[i]==null?'—':fmtMetric(seq[i],f.fmt)}`).join(' → ')); });
    if(linhas.length) out+=`\n\n**${cfg.nome}**\n`+linhas.join('\n'); });
  return out;
}
function zaTopConteudos(cy, tituloCiclo){
  const arr=[];
  cy.forEach(c=>(c.items||[]).forEach(it=>{ const d=(c.posts||{})[it.id]; if(!d) return;
    const alc=Number(d.alcance)||0, inter=(Number(d.curtidas)||0)+(Number(d.comentarios)||0)+(Number(d.salvamentos)||0)+(Number(d.compartilhamentos)||0);
    if(alc<=0&&inter<=0) return; arr.push({ t:it.titulo, per:c.periodo, alc, inter, taxa:alc>0?inter/alc*100:0 }); }));
  if(!arr.length) return '🏆 Ainda não há métricas por conteúdo preenchidas'+(tituloCiclo?` para ${tituloCiclo}`:'')+'. Peça ao Vitor para preencher em Métricas → Por conteúdo.';
  arr.sort((a,b)=>b.taxa-a.taxa);
  const med=['🥇','🥈','🥉','4º','5º'];
  return `🏆 **Conteúdos com melhor desempenho${tituloCiclo?` — ${tituloCiclo}`:''}:**\n\n`+arr.slice(0,5).map((x,i)=>`${med[i]} ${x.t}${tituloCiclo?'':` (${x.per})`}\n   Taxa ${x.taxa.toLocaleString('pt-BR',{maximumFractionDigits:1})}% · ${x.inter} interações · alcance ${x.alc}`).join('\n');
}

window.entrarGoogle = function() {
  signInWithPopup(auth, new GoogleAuthProvider()).catch(e => {
    console.error('Erro de login:', e);
    if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') return;
    if (e.code === 'auth/unauthorized-domain') { showToast('Domínio não autorizado no Firebase. Veja as configurações.'); return; }
    if (e.code === 'auth/operation-not-allowed') { showToast('Login Google ainda não ativado no Firebase Console.'); return; }
    showToast('Não foi possível entrar. Tente novamente.');
  });
};

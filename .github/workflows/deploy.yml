name: Deploy to GitHub Pages

# Publica o site estático (raiz do repo) via GitHub Actions — mais estável que o
# build automático "Deploy from a branch", que falhava de forma intermitente.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Uma publicação por vez; não cancela a que está em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configura Pages
        uses: actions/configure-pages@v5
      - name: Empacota o site (raiz do repo)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Publica no Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub — Zelo Consultoria</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F2F2F2;min-height:100vh;padding:1.5rem}
:root{
  --z-teal:#11808C;--z-teal-light:#E3F1F2;
  --z-terra:#D9814E;--z-terra-light:#FBEEE4;
  --z-ocre:#F2DC9B;--z-ocre-dark:#9A7A1F;--z-ocre-light:#FBF6E8;
  --z-cyan:#05C7F2;
  --z-text:#1A1A1A;--z-text-sec:#5A5A5A;
  --z-border:#DDDDDD;--z-bg:#F2F2F2;
  --t1:#D9814E;--t1-l:#FBEEE4;
  --t2:#11808C;--t2-l:#E3F1F2;
  --t3:#5A5A5A;--t3-l:#F0F0F0;
  --tm:#9A7A1F;--tm-l:#FBF6E8;
}
.container{max-width:1060px;margin:0 auto}

/* ════ SHELL (sidebar + main) ════ */
.shell{display:flex;gap:1.5rem;align-items:flex-start}
.sidebar{width:232px;flex-shrink:0;position:sticky;top:1.5rem;background:#fff;border:0.5px solid var(--z-border);border-radius:16px;padding:1.1rem;box-shadow:0 1px 4px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:1rem}
.main{flex:1;min-width:0}
/* brand */
.brand{display:flex;flex-direction:column;align-items:flex-start;gap:7px}
.brand-logo{width:118px;height:auto;display:block}
.brand-sub{font-size:9.5px;color:var(--z-text-sec);text-transform:uppercase;letter-spacing:.09em;font-weight:700}
/* nav */
.side-nav{display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;border:none;background:transparent;color:var(--z-text-sec);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;text-align:left;transition:background .15s,color .15s,box-shadow .15s,transform .1s;width:100%}
.nav-item:hover{background:var(--z-teal-light);color:var(--z-teal)}
.nav-item:active{transform:scale(.98)}
.nav-item.active{background:var(--z-teal);color:#fff;box-shadow:0 3px 10px rgba(17,128,140,.28)}
.nav-ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.side-foot{margin-top:auto;padding-top:.85rem;border-top:0.5px solid var(--z-border)}
.side-foot .copy-row{margin-bottom:10px}
.side-user{display:flex;align-items:center;justify-content:space-between;gap:8px}
.side-email{font-size:10.5px;color:var(--z-text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.side-sair{flex-shrink:0;background:none;border:none;color:var(--z-terra);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;padding:2px 4px}
.side-sair:hover{text-decoration:underline}
/* main head */
.main-head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:1.4rem;padding-bottom:.95rem;border-bottom:1.5px solid var(--z-border)}
.main-title{font-size:23px;font-weight:800;color:var(--z-text);letter-spacing:-.015em;line-height:1.1}
.main-sub{font-size:12px;color:var(--z-text-sec);margin-top:4px}
.main-head .hh-save,.focus-brand .hh-save{color:#9AA0A6}
.main-head .hh-save.saving,.focus-brand .hh-save.saving{color:var(--z-terra)}
/* focused (validação Gabi) */
.focused{max-width:680px;margin:0 auto}
.focus-brand{display:flex;align-items:center;gap:12px;margin-bottom:1.2rem}
.focus-brand .brand-logo{width:96px}
.focus-brand .hh-save{margin-left:auto;min-height:14px;font-size:11px;transition:color .2s}
/* micro-interações */
.tab-content{animation:fadeUp .26s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.copy-card,.plan-card,.sec-card{transition:box-shadow .18s ease,transform .18s ease,border-color .18s ease}
.copy-card:hover,.sec-card:hover{box-shadow:0 5px 18px rgba(0,0,0,.07);transform:translateY(-2px)}
.plan-card:hover{box-shadow:0 5px 18px rgba(17,128,140,.12);transform:translateY(-2px)}
@media(max-width:860px){
  .container{max-width:680px}
  .shell{flex-direction:column;gap:1rem}
  .sidebar{width:100%;position:static;flex-direction:column}
  .side-nav{flex-direction:row;gap:6px}
  .nav-item{flex:1;justify-content:center;padding:9px 6px}
  .nav-item .nav-ico{display:none}
  .side-foot{margin-top:0}
}

/* AUTH / LOGIN */
.auth-screen{min-height:78vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-card{background:#fff;border:0.5px solid var(--z-border);border-radius:18px;padding:2.4rem 2rem;box-shadow:0 6px 28px rgba(0,0,0,.07);text-align:center;max-width:340px;width:100%}
.auth-logo{width:132px;margin:0 auto 1.3rem;display:block}
.auth-title{font-size:18px;font-weight:800;color:var(--z-text);margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--z-text-sec);line-height:1.55;margin-bottom:1.5rem}
.auth-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:11px 16px;border-radius:10px;border:none;background:var(--z-teal);color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
.auth-btn:hover{background:#0A6870}
.g-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#fff;color:var(--z-teal);font-weight:800;font-size:13px}
.auth-link{margin-top:14px;background:none;border:none;color:var(--z-text-sec);font-size:12px;font-family:inherit;cursor:pointer;text-decoration:underline}
.auth-link:hover{color:var(--z-teal)}

/* HEADER */
.hub-header{background:linear-gradient(135deg,var(--z-teal) 0%,#0A5961 100%);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.hub-header::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:var(--z-cyan);opacity:0.2}
.hub-header::after{content:'';position:absolute;bottom:-30px;right:50px;width:70px;height:70px;border-radius:50%;background:var(--z-terra);opacity:0.2}
.hh-lbl{font-size:10px;color:var(--z-ocre);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:4px;position:relative}
.hh-title{font-size:22px;font-weight:700;color:#fff;position:relative;margin-bottom:2px}
.hh-sub{font-size:12px;color:rgba(255,255,255,.65);position:relative}
.hh-save{font-size:11px;color:rgba(255,255,255,.45);position:relative;margin-top:6px;min-height:14px;transition:color .2s}
.hh-save.saving{color:var(--z-ocre)}

/* TABS */
.tab-bar{display:grid;grid-template-columns:1fr 1fr 1fr;border-radius:10px;overflow:hidden;border:1.5px solid var(--z-teal);margin-bottom:10px}
.tab-btn{padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;background:#fff;color:var(--z-teal);transition:all .15s;text-align:center}
.tab-btn.active{background:var(--z-teal);color:#fff}
.tab-btn:not(.active):hover{background:var(--z-teal-light)}
.copy-row{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid var(--z-border);background:#fff;color:var(--z-text-sec);margin-bottom:1.5rem;transition:all .15s}
.copy-row:hover{border-color:var(--z-teal);color:var(--z-teal);background:var(--z-teal-light)}
.copy-row.copied{border-color:#1B6B3A;color:#1B6B3A}

/* SUB-MODO (Base de Dados) */
.sub-bar{display:flex;gap:6px;margin-bottom:1.25rem}
.sub-btn{flex:1;padding:8px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;background:#fff;border:1.5px solid var(--z-border);color:var(--z-text-sec);border-radius:8px;transition:all .15s;text-align:center}
.sub-btn.active{background:var(--z-teal-light);border-color:var(--z-teal);color:var(--z-teal);font-weight:600}

/* TIER LABELS */
.tier-lbl{display:flex;align-items:center;gap:8px;margin:1.5rem 0 .75rem;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.tier-lbl::after{content:'';flex:1;height:1px;background:currentColor;opacity:.25}
.tier-lbl.t1{color:var(--t1)}.tier-lbl.t2{color:var(--t2)}.tier-lbl.t3{color:var(--t3)}.tier-lbl.tm{color:var(--tm)}
.tier-badge{padding:2px 8px;border-radius:20px;color:#fff;font-size:10px;font-weight:700}
.tier-lbl.t1 .tier-badge{background:var(--t1)}.tier-lbl.t2 .tier-badge{background:var(--t2)}
.tier-lbl.t3 .tier-badge{background:var(--t3)}.tier-lbl.tm .tier-badge{background:var(--tm)}

/* SECTION CARDS */
.sec-card{background:#fff;border:0.5px solid var(--z-border);border-radius:12px;padding:1.25rem;margin-bottom:10px;border-left-width:3px;border-left-style:solid}
.sec-card.t1{border-left-color:var(--t1)}.sec-card.t2{border-left-color:var(--t2)}
.sec-card.t3{border-left-color:var(--t3)}.sec-card.tm{border-left-color:var(--tm)}
.sec-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:1.1rem}
.sec-badge{width:26px;height:26px;min-width:26px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.sec-card.t1 .sec-badge{background:var(--t1)}.sec-card.t2 .sec-badge{background:var(--t2)}
.sec-card.t3 .sec-badge{background:var(--t3)}.sec-card.tm .sec-badge{background:var(--tm)}
.sec-title{font-size:14px;font-weight:600;color:var(--z-text);line-height:1.2}
.sec-desc{font-size:11px;color:var(--z-text-sec);margin-top:2px;line-height:1.4}

/* FORM FIELDS */
.fld{margin-bottom:12px}
.fl{font-size:11px;font-weight:600;color:var(--z-text-sec);display:block;margin-bottom:4px;letter-spacing:.02em}
.fld input[type=text],.fld textarea{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid var(--z-border);border-radius:8px;background:#fff;color:var(--z-text);font-family:inherit;line-height:1.5}
.fld input:focus,.fld textarea:focus{outline:none;border-color:var(--z-teal);box-shadow:0 0 0 2px rgba(17,128,140,.08)}
.fld textarea{resize:none}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.two-col{grid-template-columns:1fr}}

/* PLATFORMS */
.plat-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.plat-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--z-border);background:#fff;color:var(--z-text-sec);cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s}
.plat-btn.on{background:var(--t1-l);border-color:var(--t1);color:var(--t1);font-weight:600}
.plat-url-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.plat-url-label{font-size:12px;font-weight:600;color:var(--z-text-sec);min-width:80px;flex-shrink:0}
.plat-url-inp{flex:1;font-size:12px;padding:6px 10px;border:0.5px solid var(--z-border);border-radius:7px;font-family:inherit;color:var(--z-text)}
.plat-url-inp:focus{outline:none;border-color:var(--t1)}

/* SWOT */
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.swot-card{border-radius:8px;padding:10px;border-left:3px solid}
.swot-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.swot-card textarea{width:100%;font-size:12px;padding:3px;border:none;background:transparent;resize:none;line-height:1.6;font-family:inherit;color:var(--z-text)}
.swot-card textarea:focus{outline:none}
.swot-f{border-color:#1B6B3A;background:#d7f0e0}.swot-f .swot-lbl{color:#0D4022}
.swot-w{border-color:#9A7A1F;background:#FBF6E8}.swot-w .swot-lbl{color:#5C4810}
.swot-o{border-color:#11808C;background:#E3F1F2}.swot-o .swot-lbl{color:#0A5961}
.swot-a{border-color:#D9814E;background:#FBEEE4}.swot-a .swot-lbl{color:#8A4020}

/* DYNAMIC LISTS */
.dlist-item{background:var(--z-bg);border-radius:8px;padding:10px 12px;margin-bottom:8px;border:0.5px solid var(--z-border)}
.dlist-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dlist-num{font-size:11px;font-weight:600;color:var(--z-teal)}
.dlist-del{font-size:11px;color:var(--z-terra);background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 6px;border-radius:4px}
.dlist-del:hover{background:var(--z-terra-light)}
.dlist-item label{font-size:11px;color:var(--z-text-sec);font-weight:600;display:block;margin-top:6px;margin-bottom:3px}
.dlist-item input[type=text]{width:100%;font-size:12px;padding:6px 8px;border:0.5px solid var(--z-border);border-radius:6px;font-family:inherit;background:#fff;color:var(--z-text)}
.dlist-item input:focus{outline:none;border-color:var(--z-teal)}
.add-btn{width:100%;padding:8px;font-size:12px;border-radius:8px;border:1px dashed var(--z-teal);background:transparent;cursor:pointer;color:var(--z-teal);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;transition:background .15s}
.add-btn:hover{background:var(--z-teal-light)}

/* CONTRACT */
.cs-row{display:flex;gap:6px;margin-bottom:12px}
.cs-btn{font-size:12px;padding:6px 16px;border-radius:20px;cursor:pointer;font-family:inherit;font-weight:600;background:#fff;border:1.5px solid var(--z-border);color:var(--z-text-sec);transition:all .15s}
.cs-btn.is-pendente{background:#FBF6E8;border-color:var(--z-ocre-dark);color:var(--z-ocre-dark)}
.cs-btn.is-assinado{background:#d7f0e0;border-color:#1B6B3A;color:#1B6B3A}

/* PLAN CARDS */
/* Seletor de ano (Planejamento / Copy / Conteúdos) */
.ano-bar{display:flex;gap:6px;margin-bottom:12px;border-bottom:1px solid var(--z-border);padding-bottom:0}
.ano-tab{position:relative;background:none;border:none;padding:7px 15px 9px;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--z-text-sec);cursor:pointer;border-radius:8px 8px 0 0;transition:color .15s,background .15s}
.ano-tab:hover{color:var(--z-teal);background:var(--z-teal-light)}
.ano-tab.on{color:var(--z-teal)}
.ano-tab.on::after{content:'';position:absolute;left:8px;right:8px;bottom:-1px;height:2.5px;background:var(--z-teal);border-radius:2px}
.ano-tab .ano-n{display:inline-block;margin-left:6px;font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--z-border);color:var(--z-text-sec)}
.ano-tab.on .ano-n{background:var(--z-teal);color:#fff}
.plan-card{background:var(--z-teal-light);border:0.5px solid rgba(17,128,140,.3);border-radius:10px;padding:14px;margin-bottom:8px}
.plan-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.plan-period{font-size:14px;font-weight:600;color:var(--z-teal)}
.plan-cycle{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--z-teal);color:#fff;font-weight:600}
.plan-links{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.plan-link{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px;border-radius:7px;font-size:12px;font-weight:500;text-decoration:none;font-family:inherit;border:none;cursor:pointer;transition:opacity .15s}
.plan-link:hover{opacity:.85}
.plan-vitor{background:var(--z-teal);color:#fff}
.plan-gabi{background:var(--z-terra-light);color:var(--z-terra);border:1px solid var(--z-terra)}
/* Barra de ciclo aberto (Copy/Design/Planejamento inline) */
.cycle-open-bar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.back-ciclos{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:7px;border:1px solid var(--z-border);background:#fff;color:var(--z-teal);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s}
.back-ciclos:hover{background:var(--z-teal-light);border-color:var(--z-teal)}
.cycle-open-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cycle-open-nome{font-size:14px;font-weight:600;color:var(--z-teal)}
.cycle-open-modo{font-size:11px;padding:2px 9px;border-radius:20px;background:var(--z-ocre-light);color:var(--z-ocre-dark);font-weight:600;white-space:nowrap}
.plan-newtab{margin-left:auto;text-decoration:none;font-size:15px;color:var(--z-text-sec);padding:4px 8px;border-radius:6px}
.plan-newtab:hover{background:var(--z-teal-light);color:var(--z-teal)}
.plan-iframe-wrap{border:1px solid var(--z-border);border-radius:10px;overflow:hidden;background:#fff}
.plan-iframe{display:block;width:100%;height:calc(100vh - 190px);min-height:520px;border:0}
/* ── VISÃO MACRO 2027 ─────────────────────────────────────────────── */
.mac-destaque{display:flex;align-items:center;gap:14px;padding:16px 18px;margin-bottom:14px;border-radius:12px;cursor:pointer;color:#fff;
  background:linear-gradient(120deg,var(--z-teal) 0%,#0c5f68 60%,#0a4f57 100%);box-shadow:0 4px 14px rgba(17,128,140,.25);transition:transform .18s ease,box-shadow .18s ease}
.mac-destaque:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(17,128,140,.32)}
.mac-destaque-ico{font-size:26px;line-height:1}
.mac-destaque-txt{flex:1;min-width:0}
.mac-destaque-t{font-size:15px;font-weight:700}
.mac-destaque-s{font-size:12px;opacity:.9;margin-top:2px}
.mac-destaque-cta{font-size:13px;font-weight:600;white-space:nowrap;background:rgba(255,255,255,.18);padding:6px 12px;border-radius:20px}
.mac-wrap{max-width:840px;margin:0 auto;padding-bottom:20px}
.mac-hero{background:linear-gradient(135deg,var(--z-teal),#0c5f68);color:#fff;border-radius:14px;padding:24px 22px;margin-bottom:20px}
.mac-hero-k{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.85}
.mac-hero h2{font-size:22px;font-weight:800;margin:6px 0 4px}
.mac-hero-sub{font-size:13px;opacity:.92}
.mac-thread{display:inline-flex;align-items:center;gap:7px;margin-top:14px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);padding:7px 13px;border-radius:22px;font-size:12.5px;font-weight:600}
.mac-sec{margin:26px 0}
.mac-sec-t{font-size:15px;font-weight:700;color:var(--z-teal);margin:0 0 4px;display:flex;align-items:center;gap:8px}
.mac-sec-d{font-size:12.5px;color:var(--z-text-sec);line-height:1.55;margin:0 0 14px}
/* funil */
.mac-funnel{display:flex;flex-direction:column;align-items:center;gap:8px}
.mac-layer{border-radius:10px;padding:13px 16px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.mac-layer.l-topo{width:100%;background:var(--z-cyan)}
.mac-layer.l-meio{width:84%;background:#7F77DD}
.mac-layer.l-fundo{width:68%;background:var(--z-teal)}
.mac-layer-h{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.mac-layer-h b{font-size:13.5px}
.mac-layer-h span{font-size:11px;opacity:.9}
.mac-layer-f{font-size:12px;opacity:.96;margin-top:3px}
/* ciclos timeline */
.mac-cycles{display:flex;flex-direction:column;gap:10px}
.mac-cyc{border:1px solid var(--z-border);border-left:5px solid var(--cc,#11808C);border-radius:10px;background:#fff;overflow:hidden;transition:box-shadow .18s ease}
.mac-cyc:hover{box-shadow:0 3px 12px rgba(0,0,0,.07)}
.mac-cyc-head{display:flex;align-items:center;gap:13px;padding:13px 15px;cursor:pointer}
.mac-cyc-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--cc,#11808C);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
.mac-cyc-info{flex:1;min-width:0}
.mac-cyc-per{font-size:11px;color:var(--z-text-sec);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.mac-cyc-tema{font-size:14.5px;font-weight:700;color:var(--z-text)}
.mac-cyc-tag{flex-shrink:0;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--z-teal-light);color:var(--z-teal);white-space:nowrap}
.mac-cyc-chev{flex-shrink:0;color:var(--z-text-sec);transition:transform .2s ease;font-size:13px}
.mac-cyc.open .mac-cyc-chev{transform:rotate(90deg)}
.mac-cyc-body{padding:0 15px 15px 58px;display:none}
.mac-cyc.open .mac-cyc-body{display:block}
.mac-cyc-desc{font-size:12.5px;color:var(--z-text);line-height:1.55;margin-bottom:10px}
.mac-datas{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.mac-data{font-size:11px;background:var(--z-ocre-light);color:var(--z-ocre-dark);border:1px solid var(--z-ocre);padding:3px 9px;border-radius:6px;font-weight:600}
.mac-mini-t{font-size:11px;font-weight:700;color:var(--z-text-sec);text-transform:uppercase;letter-spacing:.04em;margin:8px 0 4px}
.mac-gera{font-size:12.5px;color:var(--z-text-sec);line-height:1.5}
.mac-ind{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:var(--z-teal-light);color:var(--z-teal);font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px}
.mac-live{display:inline-block;margin-top:10px;margin-left:6px;font-size:11px;font-weight:700;background:var(--z-terra-light);color:var(--z-terra);border:1px solid var(--z-terra);padding:5px 10px;border-radius:8px}
/* grid de features */
.mac-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:620px){.mac-grid{grid-template-columns:1fr}}
.mac-feat{border:1px solid var(--z-border);border-radius:10px;padding:14px 15px;background:#fff}
.mac-feat-t{font-size:13.5px;font-weight:700;color:var(--z-text);display:flex;align-items:center;gap:7px;margin-bottom:5px}
.mac-feat-d{font-size:12px;color:var(--z-text-sec);line-height:1.5}
.mac-band{border-radius:12px;padding:16px 18px;background:var(--z-ocre-light);border:1px solid var(--z-ocre)}
.mac-quote{border-radius:12px;padding:18px 20px;background:var(--z-teal-light);border-left:5px solid var(--z-teal);font-size:13.5px;color:var(--z-text);line-height:1.6}
/* adicionar ciclo (editor) */
.add-ciclo-btn{width:100%;margin-top:4px;padding:11px;border:1.5px dashed var(--z-teal);background:var(--z-teal-light);color:var(--z-teal);border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.add-ciclo-btn:hover{background:#d5eaec}
.add-ciclo-form{margin-top:4px;border:1px solid var(--z-teal);border-radius:10px;padding:14px;background:#fff}
.acf-title{font-size:13px;font-weight:700;color:var(--z-teal);margin-bottom:10px}
.acf-inp{width:100%;box-sizing:border-box;margin-bottom:8px;padding:9px 11px;border:1.5px solid var(--z-border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--z-text)}
.acf-inp:focus{outline:none;border-color:var(--z-teal)}
.acf-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.acf-cancel{padding:8px 14px;border:1px solid var(--z-border);background:#fff;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;color:var(--z-text-sec);cursor:pointer}
.acf-save{padding:8px 14px;border:none;background:var(--z-terra);color:#fff;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
/* Barra de salvamento (Base de Dados > Edição) */
.save-bar{position:sticky;top:0;z-index:6;margin-bottom:16px;padding:10px 14px;border-radius:9px;font-size:13px;font-weight:600;border:1px solid;display:flex;align-items:center;gap:8px}
.save-bar-ico{font-size:13px}
.save-bar.saved{background:var(--z-teal-light);color:var(--z-teal);border-color:rgba(17,128,140,.3)}
.save-bar.saving{background:var(--z-ocre-light);color:var(--z-ocre-dark);border-color:var(--z-ocre)}
.save-bar.error{background:var(--z-terra-light);color:var(--z-terra);border-color:var(--z-terra)}
/* ── VISUALIZAÇÃO DASHBOARD (Base de Dados) ─────────────────────────── */
.dv-hero{background:linear-gradient(135deg,var(--z-teal),#0c5f68);color:#fff;border-radius:14px;padding:22px;margin-bottom:16px}
.dv-hero-slogan{font-size:20px;font-weight:800;line-height:1.3}
.dv-hero-pos{font-size:13px;opacity:.92;margin-top:8px;line-height:1.5;white-space:pre-line}
.dv-hero-tom{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.dv-hero-tom .doc-pill{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.25)}
.dv-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:640px){.dv-grid{grid-template-columns:1fr}}
.dv-card{background:#fff;border:1px solid var(--z-border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dv-card-full{margin-bottom:12px}
.dv-card-t{font-size:14px;font-weight:700;color:var(--z-teal);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dv-card-hint{font-size:11px;font-weight:500;color:var(--z-text-sec);background:var(--z-bg);padding:2px 8px;border-radius:20px}
.dv-blk{margin-top:10px}
.dv-blk-l{font-size:10.5px;font-weight:700;color:var(--z-text-sec);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.dv-blk-v{font-size:13px;color:var(--z-text);line-height:1.55;white-space:pre-line}
.dv-pills{display:flex;flex-wrap:wrap;gap:6px}
.dv-swot{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:640px){.dv-swot{grid-template-columns:1fr}}
.dv-q{border-radius:10px;padding:12px 14px;cursor:pointer;border:1px solid;transition:box-shadow .2s ease,transform .2s ease}
.dv-q:hover{box-shadow:0 6px 18px rgba(0,0,0,.1);transform:translateY(-2px)}
.dv-q-head{display:flex;align-items:center;gap:8px}
.dv-q-ico{font-size:16px}
.dv-q-lbl{font-size:13.5px;font-weight:700;flex:1}
.dv-q-count{font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;background:rgba(255,255,255,.7)}
.dv-q-items{list-style:none;margin:0;padding:0;display:none}
.dv-q:hover .dv-q-items,.dv-q.open .dv-q-items{display:block;margin-top:9px}
.dv-q-items li{font-size:12.5px;line-height:1.45;padding:4px 0 4px 16px;position:relative;border-top:1px solid rgba(0,0,0,.06)}
.dv-q-items li:before{content:'•';position:absolute;left:2px;opacity:.6}
.dv-q-items li:first-child{border-top:0}
.dv-q-empty{opacity:.6;font-style:italic;border-top:0!important}
.dv-q-hint{font-size:10.5px;color:var(--z-text-sec);margin-top:6px;opacity:.7}
.dv-q:hover .dv-q-hint,.dv-q.open .dv-q-hint{display:none}
.dv-q-f{background:var(--z-teal-light);border-color:rgba(17,128,140,.35)}.dv-q-f .dv-q-lbl{color:var(--z-teal)}
.dv-q-w{background:var(--z-terra-light);border-color:rgba(217,129,78,.4)}.dv-q-w .dv-q-lbl{color:var(--z-terra)}
.dv-q-o{background:var(--z-cyan-light,#cdf2fc);border-color:rgba(5,199,242,.4)}.dv-q-o .dv-q-lbl{color:#0a7c99}
.dv-q-a{background:var(--z-ocre-light);border-color:var(--z-ocre)}.dv-q-a .dv-q-lbl{color:var(--z-ocre-dark)}
.dv-mats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:640px){.dv-mats{grid-template-columns:1fr}}
.dv-mat{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1px solid var(--z-border);border-radius:10px;background:var(--z-ocre-light);text-decoration:none;color:var(--z-text);transition:box-shadow .18s,transform .18s,border-color .18s}
.dv-mat:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);transform:translateY(-2px);border-color:var(--z-ocre-dark)}
.dv-mat-nolink{cursor:default}
.dv-mat-ico{font-size:19px}
.dv-mat-txt{flex:1;min-width:0}
.dv-mat-tit{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dv-mat-tipo{font-size:11px;color:var(--z-ocre-dark);font-weight:600}
.dv-mat-arrow{font-size:15px;color:var(--z-teal)}
.dv-empty{font-size:13px;color:var(--z-text-sec);padding:6px 0}
.dv-refs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:640px){.dv-refs{grid-template-columns:1fr}}
.dv-ref{border:1px solid var(--z-border);border-radius:10px;padding:11px 13px;background:#fff}
.dv-ref-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dv-ref-nome{font-size:13px;font-weight:600}
.dv-ref-link{font-size:11px;color:var(--z-teal);text-decoration:none;white-space:nowrap}
.dv-ref-desc{font-size:12px;color:var(--z-text-sec);line-height:1.45;margin-top:5px}
/* ── ASSISTENTE DO HUB (chat pop-up) ────────────────────────────────── */
.za-fab{position:fixed;right:20px;bottom:20px;z-index:1200;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--z-teal),#0c5f68);color:#fff;font-size:24px;box-shadow:0 6px 20px rgba(17,128,140,.35);display:flex;align-items:center;justify-content:center;transition:transform .18s ease,box-shadow .18s ease}
.za-fab:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 10px 26px rgba(17,128,140,.45)}
.za-panel{position:fixed;right:20px;bottom:88px;z-index:1200;width:370px;max-width:calc(100vw - 32px);height:540px;max-height:calc(100vh - 120px);background:#fff;border:1px solid var(--z-border);border-radius:16px;box-shadow:0 14px 44px rgba(0,0,0,.2);display:none;flex-direction:column;overflow:hidden}
.za-panel.open{display:flex;animation:za-in .18s ease}
@keyframes za-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.za-head{background:linear-gradient(135deg,var(--z-teal),#0c5f68);color:#fff;padding:13px 15px;display:flex;align-items:center;gap:10px}
.za-head-ico{font-size:19px}
.za-head-t{font-size:14px;font-weight:700}
.za-head-s{font-size:10.5px;opacity:.85;font-weight:500}
.za-close{background:rgba(255,255,255,.18);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1}
.za-body{flex:1;overflow-y:auto;padding:14px;background:var(--z-bg);display:flex;flex-direction:column;gap:10px}
.za-msg{max-width:86%;padding:9px 12px;border-radius:13px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere}
.za-msg.bot{background:#fff;border:1px solid var(--z-border);align-self:flex-start;border-bottom-left-radius:3px}
.za-msg.user{background:var(--z-teal);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.za-acts{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.za-act{padding:6px 11px;border-radius:8px;border:1px solid var(--z-teal);background:var(--z-teal-light);color:var(--z-teal);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;text-align:left}
.za-act.primary{background:var(--z-terra);border-color:var(--z-terra);color:#fff}
.za-act:hover{filter:brightness(.97)}
.za-menu{border-top:1px solid var(--z-border);background:#fff;max-height:230px;overflow-y:auto;padding:10px 12px}
.za-menu-bc{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.za-menu-bc button{background:none;border:none;color:var(--z-teal);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:2px 0}
.za-menu-bc span{font-size:11px;color:var(--z-text-sec);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.za-menu-grid{display:flex;flex-direction:column;gap:6px}
.za-mbtn{text-align:left;padding:9px 12px;border-radius:9px;border:1px solid var(--z-border);background:var(--z-bg);color:var(--z-text);font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;transition:border-color .15s,background .15s}
.za-mbtn:hover{border-color:var(--z-teal);background:var(--z-teal-light)}
.za-mbtn.area{font-weight:700;color:var(--z-teal)}
/* ── ATAS DE REUNIÃO ────────────────────────────────────────────────── */
.atas-panel{background:#fff;border:1px solid var(--z-border);border-radius:12px;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.atas-head{display:flex;align-items:center;gap:9px;padding:13px 16px;cursor:pointer;background:var(--z-ocre-light);border-bottom:1px solid var(--z-ocre)}
.atas-ico{font-size:17px}
.atas-t{font-size:14px;font-weight:700;color:var(--z-ocre-dark);flex:1}
.atas-count{font-size:11px;font-weight:700;background:var(--z-ocre);color:var(--z-ocre-dark);padding:1px 9px;border-radius:20px}
.atas-chev{color:var(--z-ocre-dark);font-size:12px}
.atas-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.ata-vazio{font-size:13px;color:var(--z-text-sec);padding:6px 2px}
.ata-item{border:1px solid var(--z-border);border-radius:9px;overflow:hidden}
.ata-item.open{border-color:var(--z-ocre)}
.ata-item-head{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
.ata-item-head:hover{background:var(--z-bg)}
.ata-data{font-size:11px;font-weight:700;color:var(--z-ocre-dark);white-space:nowrap;background:var(--z-ocre-light);padding:2px 8px;border-radius:6px}
.ata-titulo{font-size:13px;font-weight:600;color:var(--z-text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ata-chev{color:var(--z-text-sec);font-size:12px}
.ata-item-body{padding:6px 12px 12px;border-top:1px dashed var(--z-border)}
.ata-row{margin-top:9px}
.ata-lbl{display:block;font-size:11px;font-weight:700;color:var(--z-text-sec);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
.ata-row input,.ata-row textarea{width:100%;box-sizing:border-box;border:1.5px solid var(--z-border);border-radius:8px;padding:8px 11px;font-family:inherit;font-size:13px;color:var(--z-text);resize:vertical}
.ata-row input:focus,.ata-row textarea:focus{outline:none;border-color:var(--z-teal)}
.ata-texto{font-size:13px;color:var(--z-text);line-height:1.55;white-space:pre-wrap}
.ata-del{margin-top:10px;background:none;border:1px solid var(--z-terra);color:var(--z-terra);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.ata-add{align-self:flex-start;margin-top:4px;background:var(--z-teal-light);border:1.5px dashed var(--z-teal);color:var(--z-teal);border-radius:9px;padding:9px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.za-foot{padding:10px;border-top:1px solid var(--z-border);display:flex;gap:8px;background:#fff}
.za-inp{flex:1;border:1.5px solid var(--z-border);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:13px;color:var(--z-text);resize:none;max-height:80px}
.za-inp:focus{outline:none;border-color:var(--z-teal)}
.za-send{border:none;background:var(--z-teal);color:#fff;width:40px;border-radius:10px;cursor:pointer;font-size:15px}
.za-flash{animation:za-flash 1.7s ease}
@keyframes za-flash{0%,100%{box-shadow:0 1px 3px rgba(0,0,0,.05)}30%{box-shadow:0 0 0 3px var(--z-cyan)}}

/* LOADING / TOAST */
.loading{position:fixed;inset:0;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;z-index:100;font-size:13px;color:var(--z-text-sec)}
.loading.hide{display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;font-size:13px;padding:10px 20px;border-radius:30px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* DOC MODE */
.doc-card{background:#fff;border:0.5px solid var(--z-border);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.doc-card-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--z-teal);display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.doc-card-title::after{content:'';flex:1;height:1px;background:var(--z-border)}
.doc-field{margin-bottom:12px}
.doc-label{font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--z-text-sec);margin-bottom:3px;text-transform:uppercase}
.doc-value{font-size:13px;color:var(--z-text);line-height:1.6;white-space:pre-line}
.doc-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.doc-pill{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;background:var(--z-teal-light);color:var(--z-teal)}
.doc-pill.terra{background:var(--z-terra-light);color:var(--z-terra)}
.doc-swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.doc-swot-card{border-radius:8px;padding:10px 12px;border-left:3px solid}
.doc-swot-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.doc-swot-body{font-size:12px;line-height:1.7;color:var(--z-text);white-space:pre-line}
.doc-ref-item{background:var(--z-bg);border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid var(--z-teal)}
.doc-ref-nome{font-size:13px;font-weight:600;color:var(--z-text)}
.doc-ref-gosta{font-size:12px;color:var(--z-text-sec);margin-top:2px}
.doc-ref-link{font-size:11px;color:var(--z-teal);text-decoration:none;margin-left:6px}

/* ════ ABA COPY ════ */
.copy-cycle-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.copy-cycle-sel{font-size:12px;padding:6px 10px;border:1.5px solid var(--z-border);border-radius:8px;font-family:inherit;color:var(--z-text);background:#fff}
.copy-gabi-btn{font-size:11px;font-weight:600;padding:6px 11px;border-radius:8px;border:1px solid var(--z-terra);background:var(--z-terra-light);color:var(--z-terra);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.copy-gabi-btn:hover{background:#f0d5c0}
.copy-gabi-btn.copied{background:#d7f0e0;border-color:#1B6B3A;color:#1B6B3A}
.copy-card{background:#fff;border:0.5px solid var(--z-border);border-radius:12px;padding:1.1rem 1.15rem;margin-bottom:12px;border-left:3px solid var(--z-teal);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:.5rem}
.cc-meta{min-width:0}
.cc-date{font-size:11px;font-weight:700;color:var(--z-terra)}
.cc-title{font-size:14px;font-weight:600;color:var(--z-text);line-height:1.25;margin:2px 0 5px}
.cc-tags{display:flex;flex-wrap:wrap;gap:5px}
.cc-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--z-teal-light);color:var(--z-teal)}
.cc-tag.fmt{background:var(--z-ocre-light);color:var(--z-ocre-dark)}
.vid-toggle{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--z-text-sec);cursor:pointer;user-select:none;padding:5px 11px;border:1.5px solid var(--z-border);border-radius:20px;white-space:nowrap;flex-shrink:0;transition:all .15s}
.vid-toggle.on{background:var(--z-terra-light);border-color:var(--z-terra);color:var(--z-terra)}
/* status chips */
.cc-status{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;margin:.5rem 0 .9rem}
.st-group{display:flex;align-items:center;gap:4px}
.st-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--z-text-sec);margin-right:2px}
.st-chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;border:1.5px solid var(--z-border);background:#fff;color:var(--z-text-sec);cursor:pointer;font-family:inherit;transition:all .12s}
.st-chip.on.andamento{background:#FBF6E8;border-color:var(--z-ocre-dark);color:var(--z-ocre-dark)}
.st-chip.on.finalizado{background:#d7f0e0;border-color:#1B6B3A;color:#1B6B3A}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getByPath(obj, path) {
  return path.split('.').reduce((o, k) => (o != null && o[k] !== undefined ? o[k] : ''), obj);
}
function setByPath(obj, path, val) {
  const keys = path.split('.');
  const last = keys.pop();
  const target = keys.reduce((o, k) => o[k], obj);
  if (target != null) target[last] = val;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
let saveTimer = null;
function agendarSalvamento() {
  const el = document.getElementById('save-status');
  if (el) { el.textContent = '● Salvando...'; el.classList.add('saving'); }
  const bar = document.getElementById('save-bar');
  if (bar) { bar.className = 'save-bar saving'; bar.innerHTML = '<span class="save-bar-ico">●</span> Salvando…'; }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(salvarNoFirebase, 1200);
}

// ── FIREBASE ─────────────────────────────────────────────────────────────────
async function carregarDoFirebase() {
  try {
    const snap = await getDoc(DOC_REF);
    if (snap.exists()) {
      const data = snap.data();
      for (const key of Object.keys(data)) {
        if (key in estado) estado[key] = data[key];
      }
    }
  } catch (e) {
    console.warn('Firebase load failed, using defaults', e);
  }
}
async function salvarNoFirebase() {
  try {
    await setDoc(DOC_REF, { ...estado, updatedAt: new Date().toISOString() });
    const el = document.getElementById('save-status');
    if (el) { el.textContent = '✓ Salvo'; el.classList.remove('saving'); }
    const bar = document.getElementById('save-bar');
    if (bar) {
      const t = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
      bar.className = 'save-bar saved';
      bar.innerHTML = `<span class="save-bar-ico">✓</span> Tudo salvo às ${t}`;
    }
    setTimeout(() => {
      const e2 = document.getElementById('save-status');
      if (e2) e2.textContent = '';
    }, 2500);
  } catch (e) {
    showToast('Erro ao salvar. Verifique a conexão.');
    const bar = document.getElementById('save-bar');
    if (bar) { bar.className = 'save-bar error'; bar.innerHTML = '<span class="save-bar-ico">⚠</span> Erro ao salvar — verifique a conexão'; }
    console.error(e);
  }
}

// ── FIELD HELPER ─────────────────────────────────────────────────────────────
function fld(label, path, placeholder, type, rows) {
  const val = esc(String(getByPath(estado, path) || ''));
  const ph = esc(placeholder || '');
  const attrs = `data-path="${path}" oninput="updateField(this)"`;
  const inp = (type === 'textarea')
    ? `<textarea rows="${rows || 3}" placeholder="${ph}" ${attrs}>${val}</textarea>`
    : `<input type="text" value="${val}" placeholder="${ph}" ${attrs}>`;
  return `<div class="fld"><label class="fl">${label}</label>${inp}</div>`;
}

function slugCiclo(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[^\x00-\x7f]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || ('ciclo-' + Date.now());
}
window.abrirAddCiclo = function() { addCicloOpen = true; renderSecM(); const el = document.getElementById('acf-periodo'); if (el) el.focus(); };
window.cancelarAddCiclo = function() { addCicloOpen = false; renderSecM(); };
window.salvarNovoCiclo = function() {
  const per = (document.getElementById('acf-periodo')?.value || '').trim();
  const cic = (document.getElementById('acf-ciclo')?.value || '').trim();
  if (!per) { showToast('Informe o período do ciclo.'); return; }
  const usados = (estado.planejamentos || []).map(cicloDocId);
  let base = slugCiclo(per), docId = base, n = 2;
  while (usados.includes(docId)) { docId = base + '-' + n; n++; }
  estado.planejamentos = estado.planejamentos || [];
  estado.planejamentos.push({ periodo: per, ciclo: cic, docId, ano: anoAtivo, status: 'em andamento' });
  agendarSalvamento();
  addCicloOpen = false;
  renderSecM();

// Os 6 ciclos temáticos de 2027 (base do cadastro; grade de cada um vive em Firestore)
const CICLOS_2027 = [
  { periodo:'Janeiro — Fevereiro 2027', ciclo:'Ciclo 1 · Recomeçar com intenção',      docId:'janeiro-fevereiro-2027', ano:2027 },
  { periodo:'Março — Abril 2027',        ciclo:'Ciclo 2 · A arte de escutar a infância', docId:'marco-abril-2027', ano:2027 },
  { periodo:'Maio — Junho 2027',         ciclo:'Ciclo 3 · Brincar é coisa séria',        docId:'maio-junho-2027', ano:2027 },
  { periodo:'Julho — Agosto 2027',       ciclo:'Ciclo 4 · Quem cuida de quem cuida',     docId:'julho-agosto-2027', ano:2027 },
  { periodo:'Setembro — Outubro 2027',   ciclo:'Ciclo 5 · Criança é presente',           docId:'setembro-outubro-2027', ano:2027 },
  { periodo:'Novembro — Dezembro 2027',  ciclo:'Ciclo 6 · Infâncias no plural',          docId:'novembro-dezembro-2027', ano:2027 },
];
// Ciclos de 2026 (jun→dez). Jun–Ago é o planejamento em andamento; os rótulos dos
// ciclos 1 e 2 ficam sem tema de propósito — serão nomeados ao montar cada grade.
const CICLOS_2026 = [
  { periodo:'Junho — Agosto 2026',      ciclo:'Ciclo 1 · Brincar é direito, não concessão', docId:'junho-agosto-2026', ano:2026 },
  { periodo:'Setembro — Outubro 2026',  ciclo:'Ciclo 2',                          docId:'setembro-outubro-2026', ano:2026 },
  { periodo:'Novembro — Dezembro 2026', ciclo:'Ciclo 3 · Do balanço ao recomeço', docId:'novembro-dezembro-2026', ano:2026 },
];
// Cadastra os ciclos de 2026 + 2027 uma única vez, preservando status, a grade de
// cada ciclo (docId inalterado) e quaisquer ciclos extras criados à mão.
function migrarCiclos() {
  if (estado.planVersion === '2026-2027b') return false;
  const antigos = estado.planejamentos || [];
  const base = [...CICLOS_2026, ...CICLOS_2027];
  const previstos = base.map(c => c.docId);
  const cadastrados = base.map(c => {
    const old = antigos.find(p => cicloDocId(p) === c.docId);
    return { periodo:c.periodo, ciclo:c.ciclo, docId:c.docId, ano:c.ano, status:(old && old.status) || 'em andamento' };
  });
  const extras = antigos
    .filter(p => !previstos.includes(cicloDocId(p)))
    .map(p => ({ ...p, ano: anoCiclo(p) }));
  estado.planejamentos = [...cadastrados, ...extras];
  estado.planVersion = '2026-2027b';
  return true;
}

// Ciclos antigos não têm o campo `ano`: deduz do período ("Maio — Junho 2027").
function anoCiclo(p) {
  if (p && p.ano) return +p.ano;
  const m = String((p && p.periodo) || '').match(/20\d\d/);
  return m ? +m[0] : 2027;
}
function ciclosDoAno(ano) {
  const alvo = ano || anoAtivo;
  return (estado.planejamentos || []).map((p, i) => ({ p, i })).filter(x => anoCiclo(x.p) === alvo);
}
function anoBarHTML() {
  return `<div class="ano-bar">` + ANOS.map(a => {
    const n = ciclosDoAno(a).length;
    return `<button class="ano-tab${a === anoAtivo ? ' on' : ''}" onclick="setAno(${a})">${a}<span class="ano-n">${n}</span></button>`;
  }).join('') + `</div>`;
}

function fmtDataAta(d){ if(!d) return '—'; const p=String(d).split('-'); return (p.length===3)?`${p[2]}/${p[1]}/${p[0]}`:d; }

    const head=`<div class="ata-item-head" onclick="toggleAta(${a.id})"><span class="ata-data">${esc(fmtDataAta(a.data))}</span><span class="ata-titulo">${esc(a.titulo||'Sem título')}</span><span class="ata-chev">${ab?'▾':'▸'}</span></div>`;
    let body='';
    if(ab){
      body = pode
        ? `<div class="ata-item-body">
            <div class="ata-row"><label class="ata-lbl">Data</label><input type="date" value="${esc(a.data||'')}" onchange="updateAta(${a.id},'data',this.value)"></div>
            <div class="ata-row"><label class="ata-lbl">Título / assunto</label><input type="text" value="${esc(a.titulo||'')}" placeholder="Ex.: Alinhamento de junho" oninput="updateAta(${a.id},'titulo',this.value)"></div>
            <div class="ata-row"><label class="ata-lbl">Anotações</label><textarea rows="6" placeholder="Cole a transcrição da reunião ou escreva os pontos discutidos…" oninput="updateAta(${a.id},'texto',this.value)">${esc(a.texto||'')}</textarea></div>
            <button class="ata-del" onclick="removeAta(${a.id})">✕ Remover ata</button>
          </div>`
        : `<div class="ata-item-body"><div class="ata-texto">${esc(a.texto||'(sem anotações)')}</div></div>`;
    }
    return `<div class="ata-item${ab?' open':''}">${head}${body}</div>`;
  }).join('');
  const addBtn=pode?`<button class="ata-add" onclick="addAta()">+ Nova ata</button>`:'';
  const vazio=!atas.length?`<div class="ata-vazio">Nenhuma ata ainda.${pode?' Clique em “+ Nova ata” para registrar uma reunião.':''}</div>`:'';

      ${atasPainelAberto?`<div class="atas-body">${vazio}${itens}${addBtn}</div>`:''}
    </div>`;
}

// ── Carregamento cross-doc + tempo real ───────────────────────────────────────
async function carregarCiclo(docId) {
  copyCiclo = docId;
  gradeItems = [];
  copyData = { itens:{} };
  try {
    const gsnap = await getDoc(doc(db, 'planejamentos', docId));
    if (gsnap.exists() && Array.isArray(gsnap.data().items)) gradeItems = gsnap.data().items;
  } catch(e){ console.warn('Falha ao carregar grade do planejamento', e); }
  try {
    const csnap = await getDoc(copyRef(docId));
    if (csnap.exists()) copyData = { itens: csnap.data().itens || {} };
  } catch(e){ console.warn('Falha ao carregar copies', e); }
  designData = { itens:{} };
  try {
    const dsnap = await getDoc(designRef(docId));
    if (dsnap.exists()) designData = { itens: dsnap.data().itens || {} };
  } catch(e){ console.warn('Falha ao carregar design', e); }
  postsData = { itens:{}, ciclo:{} };
  try {
    const psnap = await getDoc(postsRef(docId));
    if (psnap.exists()) postsData = { itens: psnap.data().itens || {}, ciclo: psnap.data().ciclo || {} };
  } catch(e){ console.warn('Falha ao carregar métricas por post', e); }
  if (copyUnsub) { copyUnsub(); copyUnsub = null; }
  copyUnsub = onSnapshot(copyRef(docId), (snap) => {
    if (!snap.exists()) return;
    copyData = { itens: snap.data().itens || {} };
    if (tabAtivo === 'copy' && document.getElementById('copy-cards')) {
      const ae = document.activeElement;
      if (!ae || !ae.closest || !ae.closest('#copy-cards')) renderCopyCards();
    }
  }, (err)=>console.warn('Copy listener:', err.code));
  if (designUnsub) { designUnsub(); designUnsub = null; }
  designUnsub = onSnapshot(designRef(docId), (snap) => {
    if (!snap.exists()) return;
    designData = { itens: snap.data().itens || {} };
    if (tabAtivo === 'design' && document.getElementById('design-cards')) {
      const ae = document.activeElement;
      if (!ae || !ae.closest || !ae.closest('#design-cards')) renderDesignCards();
    }
  }, (err)=>console.warn('Design listener:', err.code));
  if (postsUnsub) { postsUnsub(); postsUnsub = null; }
  postsUnsub = onSnapshot(postsRef(docId), (snap) => {
    if (!snap.exists()) return;
    postsData = { itens: snap.data().itens || {}, ciclo: snap.data().ciclo || {} };
    if (tabAtivo === 'metricas' && document.getElementById('metricas-body')) {
      const ae = document.activeElement;
      if (!ae || !ae.closest || !ae.closest('#metricas-body')) buildMetricasTab();
    }
  }, (err)=>console.warn('Métricas-post listener:', err.code));
}

// ── Modelo de dados de um item de copy ────────────────────────────────────────
function defaultCopy(id) {
  const it = gradeItems.find(x => x.id === id);
  return {
    isVideo: !!(it && /reels/i.test(it.formato || '')),
    direcionamento:'', materiais:'', slides:[{texto:''}], reels:'',
    legenda:'', blog:'', statusCopy:'', statusArte:'', statusGabi:'', comentarios:[], notificadoEm:''
  };
}
function normalizeCopy(c) {
  if (!Array.isArray(c.slides) || !c.slides.length) c.slides = [{texto:''}];
  if (!Array.isArray(c.comentarios)) c.comentarios = [];
  return c;
}
function getCopy(id) {
  return normalizeCopy(copyData.itens[id] ? copyData.itens[id] : defaultCopy(id));
}
function ensureCopy(id) {
  if (!copyData.itens[id]) copyData.itens[id] = defaultCopy(id);
  return normalizeCopy(copyData.itens[id]);
}
function blockText(c, block) {
  if (block === 'reels')   return c.reels || '';
  if (block === 'legenda') return c.legenda || '';
  if (block === 'blog')    return c.blog || '';
  if (block.startsWith('slide:')) { const i = +block.split(':')[1]; return (c.slides[i] && c.slides[i].texto) || ''; }
  return '';
}
function gabiLabel(s) {
  return {
    validacao_necessaria:'Validação necessária',
    em_validacao:'Em validação',
    revisao_necessaria:'Revisão necessária',
    aprovado:'Aprovado',
    cancelado:'Cancelado'
  }[s] || s;
}

function agendarSaveCopy() {

async function salvarCopy() {

// ── Formatação do copy (Unicode + emoji) ──────────────────────────────────────
// Negrito/itálico viram caracteres Unicode que sobrevivem ao colar no Instagram/
// LinkedIn (legendas são texto puro). Mantém tudo como texto → não quebra os
// comentários por posição da Gabi.
const _cA=0x41,_cZ=0x5A,_ca=0x61,_cz=0x7A,_c0=0x30,_c9=0x39;
function _toBold(ch){ const c=ch.codePointAt(0);
  if(c>=_cA&&c<=_cZ) return String.fromCodePoint(0x1D5D4+(c-_cA));
  if(c>=_ca&&c<=_cz) return String.fromCodePoint(0x1D5EE+(c-_ca));
  if(c>=_c0&&c<=_c9) return String.fromCodePoint(0x1D7EC+(c-_c0));
  return ch; }
function _toItal(ch){ const c=ch.codePointAt(0);
  if(c>=_cA&&c<=_cZ) return String.fromCodePoint(0x1D608+(c-_cA));
  if(c>=_ca&&c<=_cz) return String.fromCodePoint(0x1D622+(c-_ca));
  return ch; }
function _unstyle(ch){ const c=ch.codePointAt(0);
  if(c>=0x1D5D4&&c<=0x1D5ED) return String.fromCharCode(_cA+(c-0x1D5D4));
  if(c>=0x1D5EE&&c<=0x1D607) return String.fromCharCode(_ca+(c-0x1D5EE));
  if(c>=0x1D7EC&&c<=0x1D7F5) return String.fromCharCode(_c0+(c-0x1D7EC));
  if(c>=0x1D608&&c<=0x1D621) return String.fromCharCode(_cA+(c-0x1D608));
  if(c>=0x1D622&&c<=0x1D63B) return String.fromCharCode(_ca+(c-0x1D622));
  return ch; }
function _isBold(ch){ const c=ch.codePointAt(0); return (c>=0x1D5D4&&c<=0x1D607)||(c>=0x1D7EC&&c<=0x1D7F5); }
function _isItal(ch){ const c=ch.codePointAt(0); return (c>=0x1D608&&c<=0x1D63B); }
function copyFmtTarget(){ const ta=document.activeElement; return (ta&&ta.tagName==='TEXTAREA'&&ta.closest&&ta.closest('#copy-cards'))?ta:null; }
function copyFmtCommit(ta,val,selA,selB){ ta.value=val; ta.focus(); ta.setSelectionRange(selA,selB); ta.dispatchEvent(new Event('input',{bubbles:true})); }
window.fmtCopy=function(ev,kind){
  ev.preventDefault();
  const ta=copyFmtTarget(); if(!ta){ showToast('Clique num campo de texto do copy primeiro.'); return; }
  const s=ta.selectionStart, e=ta.selectionEnd, v=ta.value;
  if(kind==='bullet'){ const ins=(s>0&&v[s-1]!=='\n')?'\n• ':'• '; copyFmtCommit(ta, v.slice(0,s)+ins+v.slice(e), s+ins.length, s+ins.length); return; }
  if(kind==='link'){ const url=(prompt('Cole o link (entra como texto — em legenda de rede social o link não fica clicável):')||'').trim(); if(!url) return; const pre=(s!==e)?v.slice(s,e)+' ':''; const ins=pre+url; copyFmtCommit(ta, v.slice(0,s)+ins+v.slice(e), s+ins.length, s+ins.length); return; }
  if(s===e){ showToast('Selecione o texto para aplicar negrito/itálico.'); return; }
  const sel=[...v.slice(s,e)];
  const jaTem = kind==='bold' ? sel.some(_isBold) : sel.some(_isItal);
  const out = sel.map(ch=>{ const base=_unstyle(ch); return jaTem?base:(kind==='bold'?_toBold(base):_toItal(base)); }).join('');
  copyFmtCommit(ta, v.slice(0,s)+out+v.slice(e), s, s+out.length);
};
window.fmtEmojiToggle=function(ev){ ev.preventDefault(); const el=document.getElementById('fmt-emojis'); if(el) el.style.display=(el.style.display==='none'?'flex':'none'); };
window.fmtEmoji=function(ev,emo){ ev.preventDefault(); const ta=copyFmtTarget(); if(!ta){ showToast('Clique num campo de texto do copy primeiro.'); return; } const s=ta.selectionStart,e=ta.selectionEnd,v=ta.value; copyFmtCommit(ta, v.slice(0,s)+emo+v.slice(e), s+emo.length, s+emo.length); };
const FMT_EMOJIS=['😀','🙂','😍','🥰','👍','👏','🙌','🎉','✨','🔥','💡','📌','📎','✅','⚠️','❤️','🧠','🧸','🎨','📚','🌱','👶','🤱','🏫','📈','📊','🗣️','👀','💬','🤝','🌍','♻️','➡️','⭐','📅','🙏'];
function copyFmtbarHTML(){
  return `<div class="fmtbar">
    <button class="fmtb" title="Negrito (funciona ao colar no Instagram/LinkedIn)" onmousedown="fmtCopy(event,'bold')"><strong>N</strong></button>
    <button class="fmtb" title="Itálico" onmousedown="fmtCopy(event,'italic')"><em style="font-family:Georgia,serif">I</em></button>
    <button class="fmtb" title="Marcador (•)" onmousedown="fmtCopy(event,'bullet')">•</button>
    <button class="fmtb" title="Inserir link (como texto)" onmousedown="fmtCopy(event,'link')">🔗</button>
    <button class="fmtb" title="Emojis" onmousedown="fmtEmojiToggle(event)">😀</button>
    <span class="fmt-hint">selecione o texto e clique em N / I</span>
    <div class="fmt-emojis" id="fmt-emojis" style="display:none">${FMT_EMOJIS.map(e=>`<button type="button" class="fmt-emo" onmousedown="fmtEmoji(event,'${e}')">${e}</button>`).join('')}</div>

// ── Comentários (lista + marcação por palavra) ────────────────────────────────
function commentListHTML(id, c, block) {
  const cs = (c.comentarios||[]).filter(x => x.block === block && !x.resolvido);
  if (!cs.length) return '';
  return `<div class="cmt-list">${cs.map(cm => `
    <div class="cmt-item" id="cmt-${cm.id}">
      <div class="cmt-quote">“${esc(cm.quote)}”</div>
      <div class="cmt-texto">${esc(cm.texto)}</div>
      <div class="cmt-foot"><span class="cmt-meta">— ${esc(cm.autor||'Gabi')}</span>
        ${ehVisualizador() ? '' : `<button class="cmt-resolve" onclick="resolverComentario(${id},'${cm.id}')">✓ Resolver</button>`}</div>
    </div>`).join('')}</div>`;
}
function renderComentado(text, comments) {
  if (!text) return '<span class="vblock-empty">— sem texto —</span>';
  const cs = comments.filter(c => c.start < c.end).slice().sort((a,b) => a.start - b.start);
  let html = '', pos = 0;
  for (const c of cs) {
    const s = Math.max(pos, Math.min(c.start, text.length));
    const e = Math.max(s, Math.min(c.end, text.length));
    if (s > pos) html += esc(text.slice(pos, s));
    html += `<mark class="cmt" data-cid="${c.id}" onclick="focarComentario('${c.id}')">${esc(text.slice(s, e))}</mark>`;
    pos = e;
  }
  if (pos < text.length) html += esc(text.slice(pos));
  return html;
}
function offsetInBlock(block, node, nodeOffset) {
  let offset = 0;
  const walker = document.createTreeWalker(block, NodeFilter.SHOW_TEXT, null);
  let n;
  while ((n = walker.nextNode())) {
    if (n === node) return offset + nodeOffset;
    offset += n.textContent.length;
  }
  return offset;
}
function showCmtPopover(itemId, block, a, b, x, y) {
  pendingSel = { itemId, block, a, b };
  let pop = document.getElementById('cmt-pop');
  if (!pop) { pop = document.createElement('div'); pop.id = 'cmt-pop'; pop.className = 'cmt-pop'; document.body.appendChild(pop); }
  pop.innerHTML = `<textarea id="cmt-pop-ta" rows="3" placeholder="O que ajustar neste trecho?"></textarea>
    <div class="pop-actions"><button class="pop-cancel" onclick="cancelCmt()">Cancelar</button><button class="pop-save" onclick="salvarCmt()">Comentar</button></div>`;
  pop.style.display = 'block';
  pop.style.left = Math.max(8, Math.min(x, window.innerWidth - 256)) + 'px';
  pop.style.top  = (y + 8) + 'px';
  const ta = document.getElementById('cmt-pop-ta'); if (ta) ta.focus();
}
function hideCmtPopover() { const p = document.getElementById('cmt-pop'); if (p) p.style.display = 'none'; }

window.cancelCmt = function() { hideCmtPopover(); window.getSelection().removeAllRanges(); pendingSel = null; };
window.salvarCmt = function() {
  if (!pendingSel) { hideCmtPopover(); return; }
  const ta = document.getElementById('cmt-pop-ta');
  const txt = (ta ? ta.value : '').trim();
  if (!txt) { hideCmtPopover(); return; }
  const c = ensureCopy(pendingSel.itemId);
  const canon = blockText(c, pendingSel.block);
  c.comentarios.push({
    id: 'c' + Date.now() + Math.floor(Math.random()*1000),
    block: pendingSel.block, start: pendingSel.a, end: pendingSel.b,
    quote: canon.slice(pendingSel.a, pendingSel.b),
    texto: txt, autor: 'Gabi', resolvido: false, ts: Date.now()
  });
  const id = pendingSel.itemId;
  agendarSaveCopy();
  hideCmtPopover();
  window.getSelection().removeAllRanges();
  pendingSel = null;
  renderOneCard(id);
};

// Seleção de texto → popover de comentário (apenas modo validação)
document.addEventListener('mouseup', (e) => {
  if (!ehCliente()) return;
  if (e.target.closest && e.target.closest('#cmt-pop')) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const block = e.target.closest && e.target.closest('.vblock');
  if (!block) return;
  const range = sel.getRangeAt(0);
  if (!block.contains(range.startContainer) || !block.contains(range.endContainer)) return;
  const s = offsetInBlock(block, range.startContainer, range.startOffset);
  const en = offsetInBlock(block, range.endContainer, range.endOffset);
  const a = Math.min(s, en), b = Math.max(s, en);
  if (b <= a) return;
  showCmtPopover(+block.dataset.item, block.dataset.block, a, b, e.pageX, e.pageY);
});
document.addEventListener('mousedown', (e) => {
  const p = document.getElementById('cmt-pop');
  if (p && p.style.display === 'block' && !e.target.closest('#cmt-pop') && !e.target.closest('.vblock')) hideCmtPopover();
});

// ABA DESIGN — upload (Cloudinary) + preview IG/LinkedIn + validação + notificação
// ══════════════════════════════════════════════════════════════════════════════
function defaultDesign(){ return { midias:[], statusDesign:'', comentarioDesign:'', enviadoEm:'', enviadoPor:'', notificadoEm:'' }; }
// Mídias ordenadas: [{type:'image'|'video', url, publicId, w?, h?}]. Lê o formato
// antigo ({imagens:[], video:{}}) sem mutar — imagens na ordem + vídeo ao final.
function desMidias(d){
  if(!d) return [];
  if(Array.isArray(d.midias)) return d.midias;
  const m=[];
  (Array.isArray(d.imagens)?d.imagens:[]).forEach(im=>m.push({ type:'image', url:im.url, publicId:im.publicId, w:im.w, h:im.h }));
  if(d.video) m.push({ type:'video', url:d.video.url, publicId:d.video.publicId });
  return m;
}
// Reels (9:16) só quando é UM único vídeo, sem imagens. Carrossel com um slide de
// vídeo continua sendo carrossel (4:5).
function desIsReels(d){ const m=desMidias(d); return m.length===1 && m[0].type==='video'; }
// A proporção do preview segue o TIPO do conteúdo: Story e Reels são verticais
// (9:16, sem bordas nas laterais); os demais (Carrossel, Post estático) são 4:5.
function itFormato(id){ const it=(gradeItems||[]).find(x=>String(x.id)===String(id)); return it?(it.formato||''):''; }
function desVertical(id,d){ const f=itFormato(id); return f==='Story'||f==='Reels'||desIsReels(d); }
function slideInner(md,idx){
  return md&&md.type==='video'
    ? `<video src="${esc(md.url)}" controls playsinline></video>`
    : `<img src="${esc(md?md.url:'')}" alt="slide ${(idx||0)+1}">`;
}
function normalizeDesign(d){ if(!Array.isArray(d.midias)){ d.midias=desMidias(d); delete d.imagens; delete d.video; } return d; }
function getDesign(id){ return normalizeDesign(designData.itens[id] ? designData.itens[id] : defaultDesign()); }
function ensureDesign(id){ if(!designData.itens[id]) designData.itens[id]=defaultDesign(); return normalizeDesign(designData.itens[id]); }
function designLabel(s){ return { aprovado:'Aprovado', ajustes_necessarios:'Ajustes necessários', em_analise:'Em análise' }[s] || s; }

function agendarSaveDesign(){
  const el=document.getElementById('save-status'); if(el){ el.textContent='● Salvando...'; el.classList.add('saving'); }
  clearTimeout(designSaveTimer); designSaveTimer=setTimeout(salvarDesign,1000);
}
async function salvarDesign(){
  if(!copyCiclo) return;
  try{
    await setDoc(designRef(copyCiclo), { itens: designData.itens, updatedAt:new Date().toISOString() });
    const el=document.getElementById('save-status'); if(el){ el.textContent='✓ Salvo'; el.classList.remove('saving'); }
    setTimeout(()=>{ const e2=document.getElementById('save-status'); if(e2)e2.textContent=''; },2500);
  }catch(e){ showToast('Erro ao salvar design.'); console.error(e); }
}

// Upload sem backend — Cloudinary unsigned
async function uploadCloudinary(file){
  const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',CLOUDINARY_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/auto/upload`,{ method:'POST', body:fd });
  if(!res.ok) throw new Error('upload '+res.status);
  const d=await res.json();
  return { url:d.secure_url, publicId:d.public_id, w:d.width, h:d.height, resource_type:d.resource_type };
}

  const header=`<div class="cc-head"><div class="cc-meta">

    </div>${statusDesignBadge(d)}</div>`;
  const previews=`<div class="prev-grid">${carouselHTML(it.id,'ig',d)}${carouselHTML(it.id,'li',d)}</div>`;
  if(designMode==='edit'){
    const upload=uploadAreaHTML(it.id,d);

  }

async function carregarMetricas(){
  try{
    const s = await getDoc(metricasRef);
    if (s.exists() && Array.isArray(s.data().snapshots)) metricasData = { snapshots: s.data().snapshots };
  }catch(e){ console.warn('Falha ao carregar métricas', e); }
  if (metricasUnsub){ metricasUnsub(); metricasUnsub=null; }
  metricasUnsub = onSnapshot(metricasRef, (snap)=>{
    if(!snap.exists()) return;
    metricasData = { snapshots: snap.data().snapshots || [] };
    if (tabAtivo==='metricas' && document.getElementById('metricas-body')){
      const ae=document.activeElement;
      if(!ae||!ae.closest||!ae.closest('#metricas-body')) buildMetricasTab();
    }
  }, (err)=>console.warn('Métricas: sem acesso (verifique a regra do Firestore para /metricas):', err.code));
}
function agendarSaveMetricas(){
  const el=document.getElementById('save-status'); if(el){ el.textContent='● Salvando...'; el.classList.add('saving'); }
  clearTimeout(metricasSaveTimer); metricasSaveTimer=setTimeout(salvarMetricas,1000);

async function salvarMetricas(){
  try{
    await setDoc(metricasRef, { snapshots: metricasData.snapshots, updatedAt:new Date().toISOString() });

// helpers
function snapsSorted(){ return (metricasData.snapshots||[]).slice().sort((a,b)=>(a.mesRef||'').localeCompare(b.mesRef||'')); }
// Ano de um snapshot vem do mesRef ("2026-07" → 2026). Métricas mensais são
// agrupadas pelo ano ativo (seletor no topo da aba), como Planejamento/Copy/Conteúdos.
function anoDoMes(ref){ const y=parseInt(String(ref||'').slice(0,4),10); return isNaN(y)?null:y; }
function snapsAno(){ return snapsSorted().filter(s=>anoDoMes(s.mesRef)===anoAtivo); }
function mesLabel(ref){ if(!ref) return ''; const [y,m]=ref.split('-'); return (MESES_ABR[(+m)-1]||'')+'/'+(y||'').slice(2); }
function shortNum(v){ v=Number(v)||0; if(Math.abs(v)>=1000) return (v/1000).toLocaleString('pt-BR',{maximumFractionDigits:1})+'k'; return String(v); }
function fmtMetric(v, fmt){
  if(fmt==='text') return (v==null||v==='')?'—':v;
  if(v==null||v===''||isNaN(v)) return '—';
  if(fmt==='pct') return Number(v).toLocaleString('pt-BR',{maximumFractionDigits:2})+'%';
  if(fmt==='dec') return Number(v).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1});
  return Number(v).toLocaleString('pt-BR');
}
function deltaHTML(cur, prev, fmt){
  if(fmt==='text'||prev==null||prev===''||cur==null||cur==='') return '';
  const c=Number(cur), p=Number(prev); if(isNaN(c)||isNaN(p)||p===0) return '';
  const pct=(c-p)/p*100; const up=c>=p;
  return `<span class="mx-delta ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(pct).toLocaleString('pt-BR',{maximumFractionDigits:1})}%</span>`;
}
function metricaChartKey(plat){ return metricaChart[plat] || METRICAS_CONFIG[plat].campos[0].k; }

function valorMetrica(snap, plat, field){
  const po=(snap&&snap[plat])?snap[plat]:{};
  if(field.derived){
    if(field.k==='engajamento'){ const base=Number(po[field.base]); const inter=Number(po.interacoes); return (base>0&&!isNaN(inter))?(inter/base*100):''; }
    return '';
  }
  return (po[field.k]===undefined)?'':po[field.k];
}
function heroCards(plat){
  const cfg=METRICAS_CONFIG[plat]; const snaps=snapsAno();
  const cur=snaps[snaps.length-1]||null; const prev=snaps[snaps.length-2]||null;
  return allCampos(plat).map(f=>{
    const cv=cur?valorMetrica(cur,plat,f):''; const pv=prev?valorMetrica(prev,plat,f):'';
    return `<div class="mx-card${f.derived?' mx-card-calc':''}" style="border-top-color:${cfg.cor}">
      <div class="mx-card-lbl">${f.lbl}${f.derived?' <span class="mx-calc-tag">auto</span>':''}</div>
      <div class="mx-card-val">${cur?fmtMetric(cv,f.fmt):'—'}</div>
      <div class="mx-card-foot">${deltaHTML(cv,pv,f.fmt)}${prev?'<span class="mx-card-vs">vs. mês ant.</span>':''}</div>
    </div>`;
  }).join('');
}
function chartSVG(plat){
  const cfg=METRICAS_CONFIG[plat]; const key=metricaChartKey(plat); const field=allCampos(plat).find(f=>f.k===key)||allCampos(plat)[0];
  const snaps=snapsAno(); const data=snaps.map(s=>({ label:mesLabel(s.mesRef), value:Number(valorMetrica(s,plat,field))||0 }));
  if(!data.length) return `<div class="mx-empty">Sem dados de ${anoAtivo} para exibir. Adicione um mês em "Dados".</div>`;
  const W=360,H=180,padX=14,top=16,bottom=24; const max=Math.max(1,...data.map(d=>d.value));
  const n=data.length, gap=n>1?8:0; const bw=Math.max(6,(W-padX*2-gap*(n-1))/n);
  let out='';
  data.forEach((d,i)=>{
    const bh=Math.max(1,(d.value/max)*(H-top-bottom)); const x=padX+i*(bw+gap); const y=H-bottom-bh;
    out+=`<rect class="mx-bar" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${cfg.cor}"><title>${esc(d.label)}: ${fmtMetric(d.value,field.fmt)}</title></rect>`;
    out+=`<text x="${x+bw/2}" y="${H-bottom+13}" text-anchor="middle" font-size="9" fill="#5A5A5A">${esc(d.label)}</text>`;
    if(n<=8) out+=`<text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="9" fill="#1A1A1A" font-weight="700">${shortNum(d.value)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" class="mx-chart" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Evolução de ${esc(field.lbl)}">${out}</svg>`;
}
function tabelaDados(plat){
  const cfg=METRICAS_CONFIG[plat]; const snaps=snapsAno();
  const header=`<tr><th>Mês</th>${cfg.campos.map(f=>`<th>${f.lbl}</th>`).join('')}<th></th></tr>`;
  const rows=snaps.map(s=>`<tr>
      <td><input type="month" value="${esc(s.mesRef||'')}" onchange="updateMesRef('${s.id}',this.value)"></td>
      ${cfg.campos.map(f=>`<td><input type="${f.fmt==='text'?'text':'number'}" step="any" value="${esc((s[plat]&&s[plat][f.k])??'')}" oninput="updateMetrica('${s.id}','${plat}','${f.k}',this.value)"></td>`).join('')}
      <td><button class="mx-del" onclick="removeSnapshot('${s.id}')" title="Remover mês">✕</button></td>
    </tr>`).join('');
  return `<div class="mx-hint">Preencha os números de cada mês para <strong>${cfg.nome}</strong>. Os campos das outras plataformas ficam nas respectivas abas.</div>
    <div class="mx-table-wrap"><table class="mx-table">${header}${rows}</table></div>
    <button class="add-btn" onclick="addSnapshot()">+ Adicionar mês</button>`;
}
function buildMetricasTab(){
  const cont=document.getElementById('tab-content'); if(!cont) return;

// ── Métricas por conteúdo (puxadas da grade) ──────────────────────────────────
function getPost(id){ return postsData.itens[id] || {}; }
function ensurePost(id){ if(!postsData.itens[id]) postsData.itens[id]={}; return postsData.itens[id]; }
function calcInteracoes(p){ return ['curtidas','comentarios','salvamentos','compartilhamentos'].reduce((a,k)=>a+(Number(p[k])||0),0); }
function calcEngPost(p){ const alc=Number(p.alcance); const inter=calcInteracoes(p); return alc>0?(inter/alc*100):null; }
// Alcance/interações/engajamento cientes do tipo (social/story/blog).
function postTipoById(id){ return tipoPost((gradeItems||[]).find(x=>x.id===id)); }
function postAlcance(p,tipo){ return tipo==='social' ? (Number(p.alcance)||0) : (Number(p.visualizacoes)||0); }
function postInteracoes(p,tipo){ if(tipo==='story') return Number(p.interacoes)||0; if(tipo==='blog') return 0; return calcInteracoes(p); }
function postEng(p,tipo){ const a=postAlcance(p,tipo), i=postInteracoes(p,tipo); return a>0?(i/a*100):null; }
// Agrega o desempenho dos conteúdos de um ciclo (base do "Resumo do ciclo").
function agregarPosts(items, posts){
  let alcance=0, inter=0, n=0, best=null;
  (items||[]).forEach(it=>{
    const p=(posts||{})[it.id]; if(!p) return;
    const tipo=tipoPost(it); const a=postAlcance(p,tipo), i=postInteracoes(p,tipo);
    if(!a && !i) return;
    alcance+=a; inter+=i; n++;
    const eng=a>0?(i/a*100):0;
    if(!best || eng>best.eng) best={it,eng,alcance:a,inter:i};
  });
  return { alcance, inter, n, engMedio:(alcance>0?(inter/alcance*100):null), best };
}
function agendarSavePosts(){ const el=document.getElementById('save-status'); if(el){el.textContent='● Salvando...';el.classList.add('saving');} clearTimeout(postsSaveTimer); postsSaveTimer=setTimeout(salvarPosts,1000); }
async function salvarPosts(){ if(!copyCiclo) return; try{ await setDoc(postsRef(copyCiclo),{itens:postsData.itens,ciclo:postsData.ciclo||{},updatedAt:new Date().toISOString()}); const el=document.getElementById('save-status'); if(el){el.textContent='✓ Salvo';el.classList.remove('saving');} setTimeout(()=>{const e2=document.getElementById('save-status'); if(e2)e2.textContent='';},2500); }catch(e){ showToast('Erro ao salvar métricas por post.'); console.error(e); } }
